name: Release

# Cross-platform desktop build. Gated to the release branch / version tags so it
# doesn't run on every push (ci.yml runs typecheck/lint/test on the release branch).
on:
  push:
    branches: [release]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libssl-dev patchelf librsvg2-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build analyzer-core (native .node, per-OS)
        working-directory: analyzer-core
        run: bunx @napi-rs/cli build --release

      - name: Build analysis sidecar (per-OS triple binary)
        run: bun run tauri:sidecar

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required to produce verifiable update artifacts.
          # See docs/RELEASING.md for how to generate and store these.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization — optional; bundles are unsigned if unset.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # On a version tag, publish a draft GitHub Release with the installers +
          # the updater manifest (latest.json); otherwise just build the bundles.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('PolyGraph {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

      - name: Upload bundles as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: polygraph-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore
