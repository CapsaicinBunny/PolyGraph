name: Release

# Cross-platform desktop build. Gated to the release branch / version tags so it
# doesn't run on every push (ci.yml runs typecheck/lint/test on PRs + main/release).
on:
  push:
    branches: [release]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Linux on 22.04, not ubuntu-latest (24.04): the older glibc (2.35) makes the
        # deb/rpm bundles run on a far wider range of distros.
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libssl-dev patchelf librsvg2-dev libfuse2 \
            libwebkit2gtk-4.1-dev libappindicator3-dev

      - name: Work around linuxdeploy aborting on the bun sidecar
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # The AppImage bundler (linuxdeploy) aborts (SIGABRT) when `ldd` exits non-zero,
          # which it does on the self-contained bun sidecar (ldd: "not a dynamic
          # executable"). Wrap ldd to pass its output through (so libraries are still
          # discovered) but swallow the non-zero exit ONLY for the sidecar — a real
          # missing-library failure on any other binary must still abort the bundle.
          sudo mv /usr/bin/ldd /usr/bin/ldd.real
          printf '%s\n' '#!/usr/bin/env bash' \
            'out=$(/usr/bin/ldd.real "$@" 2>&1); rc=$?' \
            'printf "%s\n" "$out"' \
            'case "$*" in *polygraph-sidecar*) exit 0;; esac' \
            'exit $rc' | sudo tee /usr/bin/ldd >/dev/null
          sudo chmod +x /usr/bin/ldd

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build analyzer-core (native .node, per-OS)
        working-directory: analyzer-core
        run: bunx @napi-rs/cli build --release

      - name: Build analysis sidecar (per-OS triple binary)
        run: bun run tauri:sidecar

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Windows ships a portable zip (assembled below), so skip bundling there and
          # just build the exe. Linux (deb/rpm/AppImage) and macOS (dmg/.app) build their
          # full default bundle set — the AppImage works now that ldd is wrapped above.
          args: ${{ matrix.os == 'windows-latest' && '--no-bundle' || '' }}
          # On a version tag, publish a draft GitHub Release with the unsigned bundles
          # (Linux/macOS) + the Windows portable zip (attached below); otherwise just
          # build, with everything uploaded as artifacts. Unsigned — no auto-update.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('PolyGraph {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      # Windows portable distribution: a plain zip of the app exe + the sidecar + the
      # native addon + language packs, laid out flat beside the exe — which is where
      # resource_dir() points on Windows, so it matches what lib.rs reads at runtime.
      # Assembled from the source artifacts the earlier steps built, so it doesn't depend
      # on Tauri's bundle staging. Needs the system WebView2 runtime (preinstalled on
      # Win11; normally present on Win10, with a download-link fallback in lib.rs).
      - name: Package Windows portable zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # An explicit `shell: pwsh` step does NOT get $ErrorActionPreference=Stop (only
          # the auto-default shell does), so a missing source file would be non-terminating
          # and we'd ship an incomplete zip with green CI. Make every failure fatal.
          $ErrorActionPreference = 'Stop'
          $stage = "PolyGraph"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "src-tauri/target/release/polygraph.exe" "$stage/"
          $sidecar = Get-ChildItem "src-tauri/binaries/polygraph-sidecar-*.exe" | Select-Object -First 1
          if (-not $sidecar) { throw "No sidecar matched src-tauri/binaries/polygraph-sidecar-*.exe" }
          Copy-Item $sidecar.FullName "$stage/polygraph-sidecar.exe"
          Copy-Item "analyzer-core/analyzer-core.node" "$stage/"
          Copy-Item "language-packs" "$stage/" -Recurse
          # App-local VC++ runtime (~0.8 MB). A *missing* system VC++ redist would stop
          # the exe from starting before any of our code runs (so we couldn't show the
          # WebView2-style dialog for it) — bundling it app-local makes that impossible.
          foreach ($dll in "vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll") {
            Copy-Item "$env:SystemRoot/System32/$dll" "$stage/"
          }
          $version = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $zip = "PolyGraph_${version}_windows-x64-portable.zip"
          Compress-Archive -Path $stage -DestinationPath $zip -Force
          Write-Host "Built portable zip:"
          Get-ChildItem $zip | Format-List Name, Length

      - name: Attach Windows portable zip to the release
        if: ${{ matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem PolyGraph_*_windows-x64-portable.zip | Select-Object -First 1
          if (-not $zip) { throw "Portable zip not found — the packaging step must have failed." }
          gh release upload "${{ github.ref_name }}" $zip.FullName --clobber --repo "${{ github.repository }}"

      - name: Upload bundles as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: polygraph-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*
            PolyGraph_*_windows-x64-portable.zip
          if-no-files-found: ignore

      # Best-effort SHA-256 checksums for the built bundles, attached to the draft
      # release (one file per OS). continue-on-error so a checksum hiccup never
      # blocks publishing the installers themselves.
      - name: Checksums for release bundles
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out="SHA256SUMS-${{ matrix.os }}.txt"
          : > "$out"
          find src-tauri/target/release/bundle -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.app.tar.gz' \
               -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -print0 \
            | while IFS= read -r -d '' f; do sha256sum "$f" >> "$out"; done
          cat "$out"
          gh release upload "${{ github.ref_name }}" "$out" --clobber --repo "$GITHUB_REPOSITORY"
