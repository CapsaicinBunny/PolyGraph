name: Release

# Cross-platform desktop build. Gated to the release branch / version tags so it
# doesn't run on every push (ci.yml runs typecheck/lint/test on PRs + main/release).
#
# Each matrix leg builds NATIVELY on a runner of its own architecture (no
# cross-compilation): the per-arch analyzer-core .node and the Bun sidecar are built
# on the same machine, so they always match the target. Arch coverage:
#   - Windows  x86_64        → NSIS + MSI   (also runs on Windows-on-ARM via emulation;
#                              native win-arm64 is not built — Bun has no
#                              windows-arm64 --compile target for the sidecar)
#   - macOS    Apple Silicon → .dmg
#   - Linux    x86_64        → AppImage + .tar.gz
#   - Linux    aarch64       → AppImage
on:
  push:
    branches: [release]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            bundles: nsis,msi
          - os: macos-latest # Apple Silicon
            label: macos-arm64
            bundles: dmg
          - os: ubuntu-latest
            label: linux-x64
            bundles: appimage
            tarball: true
          - os: ubuntu-24.04-arm # native arm64 runner
            label: linux-arm64
            bundles: appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Install Linux build dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libssl-dev patchelf librsvg2-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build analyzer-core (native .node, per-arch)
        working-directory: analyzer-core
        run: bunx @napi-rs/cli build --release

      - name: Build analysis sidecar (per-arch triple binary)
        run: bun run tauri:sidecar

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a version tag, publish a draft GitHub Release with the unsigned
          # installers; otherwise just build the bundles (uploaded as artifacts
          # below). Bundles are unsigned — auto-update is not enabled.
          args: --bundles ${{ matrix.bundles }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('PolyGraph {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      # amd64 portable tarball (for Arch / generic Linux): extract the AppImage's
      # AppDir (binary + bundled sidecar + analyzer-core.node + language-packs, laid
      # out correctly) and tar it. Tauri has no native tar.gz bundle target.
      - name: Package amd64 tar.gz
        if: ${{ matrix.tarball && startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          appimage=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          [ -n "$appimage" ] || { echo "no AppImage found"; exit 0; }
          chmod +x "$appimage"
          "$appimage" --appimage-extract >/dev/null
          dir="PolyGraph_${{ github.ref_name }}_amd64"
          mv squashfs-root "$dir"
          tar czf "${dir}.tar.gz" "$dir"
          gh release upload "${{ github.ref_name }}" "${dir}.tar.gz" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload bundles as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: polygraph-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore

      # Best-effort SHA-256 checksums for the built bundles, attached to the draft
      # release (one file per arch). continue-on-error so a checksum hiccup never
      # blocks publishing the installers themselves.
      - name: Checksums for release bundles
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out="SHA256SUMS-${{ matrix.label }}.txt"
          : > "$out"
          find src-tauri/target/release/bundle -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' \
               -o -name '*.AppImage' \) -print0 \
            | while IFS= read -r -d '' f; do sha256sum "$f" >> "$out"; done
          cat "$out"
          gh release upload "${{ github.ref_name }}" "$out" --clobber --repo "$GITHUB_REPOSITORY"
