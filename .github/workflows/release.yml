name: Release

# Cross-platform desktop build. Gated to the release branch / version tags so it
# doesn't run on every push (ci.yml runs typecheck/lint/test on PRs + main/release).
on:
  push:
    branches: [release]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libssl-dev patchelf librsvg2-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build analyzer-core (native .node, per-OS)
        working-directory: analyzer-core
        run: bunx @napi-rs/cli build --release

      - name: Build analysis sidecar (per-OS triple binary)
        run: bun run tauri:sidecar

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # linuxdeploy + appimagetool (the AppImage bundlers) are themselves AppImages,
          # and ubuntu-latest (24.04 / noble) ships no libfuse2 — so they can't FUSE-mount
          # and bundling dies with "failed to run linuxdeploy". Tell them to extract and
          # run instead of mounting. No-op on Windows/macOS. The deb/rpm bundles already
          # build fine; this is only the AppImage target.
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          # Windows ships as a portable zip (assembled in the next step), not an
          # installer — so skip bundling there and just build the exe. Linux/macOS
          # still build their installers/bundles.
          args: ${{ matrix.os == 'windows-latest' && '--no-bundle' || '' }}
          # On a version tag, publish a draft GitHub Release with the unsigned bundles
          # (Linux/macOS) + the Windows portable zip (attached below); otherwise just
          # build, with everything uploaded as artifacts. Unsigned — no auto-update.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('PolyGraph {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      # Windows portable distribution: a plain zip of the app exe + the sidecar +
      # the native addon + language packs — exactly what lib.rs resolves from the
      # resource dir at runtime (the exe's own folder on Windows). Assembled from the
      # source artifacts the earlier steps built, so it doesn't depend on Tauri's
      # bundle staging. Needs the system WebView2 runtime (present on Win10 1803+/11).
      - name: Package Windows portable zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $stage = "PolyGraph"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "src-tauri/target/release/polygraph.exe" "$stage/"
          $sidecar = Get-ChildItem "src-tauri/binaries/polygraph-sidecar-*.exe" | Select-Object -First 1
          Copy-Item $sidecar.FullName "$stage/polygraph-sidecar.exe"
          Copy-Item "analyzer-core/analyzer-core.node" "$stage/"
          Copy-Item "language-packs" "$stage/" -Recurse
          $version = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $zip = "PolyGraph_${version}_windows-x64-portable.zip"
          Compress-Archive -Path $stage -DestinationPath $zip -Force
          Write-Host "Built portable zip:"
          Get-ChildItem $zip | Format-List Name, Length

      - name: Attach Windows portable zip to the release
        if: ${{ matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = Get-ChildItem PolyGraph_*_windows-x64-portable.zip | Select-Object -First 1
          gh release upload "${{ github.ref_name }}" $zip.FullName --clobber --repo "${{ github.repository }}"

      - name: Upload bundles as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: polygraph-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*
            PolyGraph_*_windows-x64-portable.zip
          if-no-files-found: ignore

      # Best-effort SHA-256 checksums for the built bundles, attached to the draft
      # release (one file per OS). continue-on-error so a checksum hiccup never
      # blocks publishing the installers themselves.
      - name: Checksums for release bundles
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out="SHA256SUMS-${{ matrix.os }}.txt"
          : > "$out"
          find src-tauri/target/release/bundle -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.app.tar.gz' \
               -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -print0 \
            | while IFS= read -r -d '' f; do sha256sum "$f" >> "$out"; done
          cat "$out"
          gh release upload "${{ github.ref_name }}" "$out" --clobber --repo "$GITHUB_REPOSITORY"
