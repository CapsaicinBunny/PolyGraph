name: Release

# Cross-platform desktop build. Gated to the release branch / version tags so it
# doesn't run on every push (the light ci.yml covers PR-style checks).
on:
  push:
    branches: [release]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libssl-dev patchelf librsvg2-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build analyzer-core (native .node, per-OS)
        working-directory: analyzer-core
        run: bunx @napi-rs/cli build --release

      - name: Build analysis sidecar (per-OS triple binary)
        run: bun run tauri:sidecar

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a version tag, publish a draft GitHub Release with the installers;
          # otherwise just build the bundles (downloadable as run artifacts).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('PolyGraph {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      - name: Upload bundles as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: polygraph-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore
