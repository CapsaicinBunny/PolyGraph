name: CI

# Validate every pull request and every push to main/release. The expensive
# cross-platform desktop build stays in release.yml (release branch + version tags).
on:
  pull_request:
  push:
    branches: [main, release]
  workflow_dispatch:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      # Golden-graph + layout-stability snapshots run inside `bun test` above and
      # hard-gate correctness. The perf numbers below are reported (not gated): absolute
      # timings are runner-dependent, so `bench:check` is an opt-in local gate — to gate
      # in CI, refresh baselines on this runner via the bench:update workflow first.
      - name: Test
        run: bun test

      - name: Benchmark (report)
        run: bun run bench

      - name: Build sidecar
        run: bun run build:sidecar

      - name: Build web (static export)
        run: bun run build
